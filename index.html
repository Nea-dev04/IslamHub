<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IslamHub - High-Tech Minimaliste</title>
  <link rel="stylesheet" href="./css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <header class="header">
    <div class="logo">
      <img src="./assets/logo.png" alt="IslamHub Logo">
      <span>IslamHub</span>
    </div>
    <nav>
      <ul class="nav-links" id="navLinks">
        <li><a href="#coran">Coran</a></li>
        <li><a href="#noms">Noms d'Allah</a></li>
        <li><a href="#fiqh">Fiqh</a></li>
        <li><a href="#education">Éducation</a></li>
      </ul>
    </nav>
    <div class="nav-controls">
      <button id="darkModeToggle">🌙</button>
      <div class="burger" id="burgerMenu">
        <span></span><span></span><span></span>
      </div>
    </div>
  </header>

  <section class="hero-section">
    <h1>IslamHub</h1>
    <p>L'excellence du savoir à portée de clic.</p>
  </section>

  <main>
    <section id="coran" class="content-section">
      <h2>Coran & Hadith</h2>
      <div class="cards-container">
        <div class="card"><h3>PDFs</h3></div>
        <div class="card"><h3>Audio</h3></div>
        <div class="card"><h3>Vidéos</h3></div>
      </div>
    </section>
  </main>

  <script src="./js/main.js"></script>
</body>
  </html>
